# =========================================================
#  General / Power
# =========================================================
CONFIG_ZMK_KEYBOARD_NAME="Corne 42"
CONFIG_ZMK_SLEEP=y
# 15 min -> deep sleep
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000   
# stronger BT signal
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y         

# =========================================================
#  Split (wireless BLE)
# =========================================================
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# =========================================================
#  OLED Display (SSD1306 128x32)
# =========================================================
CONFIG_ZMK_DISPLAY=y
# gates VEXT to display + LEDs
CONFIG_ZMK_EXT_POWER=y                 
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# Optional: rotate display 180° if your OLED is upside down
# CONFIG_ZMK_DISPLAY_INVERT=y

# =========================================================
#  RGB Underglow + Per-Key WS2812
# =========================================================
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_SPI=y

# Power behavior
# toggling RGB also toggles VEXT
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n       
# save battery when idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=60000   
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# Startup look
# 0=Solid 1=Breathe 2=Spectrum 3=Swirl
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3       
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=240
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
# cap brightness for battery life
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=80        

# =========================================================
#  Optional extras
# =========================================================
CONFIG_ZMK_POINTING=y                    # enable mouse keys
CONFIG_ZMK_STUDIO=y                      # ZMK Studio runtime keymap edits
CONFIG_ZMK_STUDIO_LOCKING=n